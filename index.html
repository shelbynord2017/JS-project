<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <link rel="stylesheet" href="styles.css">
  <script src="index.js" defer></script>
    <title>Document</title>
</head>
<body>
  <section id="landing">
        <nav>
            <div class="nav__container">
              <div class="row nav__row">
                  <figure class="logo__wrapper">
                    <img src="Screenshot 2026-03-13 163711.png" alt="Logo" class="nav__logo--img">
                  </figure>
                  <div class="nav__links">
                    <a href="#" class="nav__link">Recipes</a>
                    <a href="#" class="nav__link">About</a>
                    <a href="#" class="nav__link">Contact</a>
                  </div>
              </div>
            </div>
        </nav>
  </section>


  <div class="forms">  
    <form class="search__form">
      <input type="search" class="search__bar" name="q" placeholder="Search..." aria-label="Search through the site content">
      <button type="submit" class="btn__search">Search</button>
    </form>
    <select id="filter" onchange="filterRecipes(event)">
      <option value="SORT">Sort</option>
      <option value="A__TO__Z">A-Z</option>
      <option value="Z__TO__A">Z-A</option>
      <option value="MOST INGREDIENTS__TO__LEAST INGREDIENTS">Most Ingredients to Least Ingredients</option>
      <option value="LEAST INGREDIENTS__TO__MOST INGREDIENTS">Least Ingredients to Most Ingredients</option>
    </select>
  </div>

    <h1 class="title">Recipes</h1>
    <div class="recipe__wrapper">
      <ul class="ingredients"></ul>
    </div>
    <div class="btns">
      <button id="prevBtn" onclick="">Previous</button>
      <button id="nextBtn" onclick="">Next</button>
    </div>
</body>
</html>
